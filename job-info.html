function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function render(){
  const nav=document.getElementById('nav'), main=document.getElementById('main');
  D.forEach((cat,ci)=>{
    const catId='cat-'+ci;
    const pill=document.createElement('button');
    pill.type='button'; pill.className='pill'; pill.textContent=cat.short;
    pill.addEventListener('click',()=>{
      const el=document.getElementById(catId);
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    });
    nav.appendChild(pill);

    const sec=document.createElement('section');
    sec.className='cat'; sec.id=catId;
    const h=document.createElement('h2');
    h.className='cat-title'; h.textContent=cat.title;
    sec.appendChild(h);

    const list=document.createElement('div');
    list.className='cat-list';

    cat.co.forEach(c=>{
      const det=document.createElement('details');
      det.className='co';
      if(c.rank) det.classList.add('ranked');
      const sum=document.createElement('summary');

      if(c.rank){
        const badge=document.createElement('span');
        badge.className='rank-badge rank-'+c.rank;
        badge.textContent=c.rank;
        sum.appendChild(badge);
      }

      const nameSpan=document.createElement('span');
      nameSpan.textContent=c.name;
      sum.appendChild(nameSpan);

      det.appendChild(sum);

      const body=document.createElement('div');
      body.className='body';

      body.innerHTML=
        '<div class="sec-label">会社概要</div>'+
        c.overview.map(l=>'<div class="info-line">・'+esc(l)+'</div>').join('')+
        '<div class="sec-label">求人内容</div>'+
        c.job.map(l=>'<div class="info-line">・'+esc(l)+'</div>').join('')+
        '<div class="sec-label">求職者へのアピールポイント</div>'+
        c.appeal.map(l=>'<div class="appeal">・'+esc(l)+'</div>').join('');

      if(c.url){
        const urlBar=document.createElement('div');
        urlBar.className='url-bar';
        const link=document.createElement('a');
        link.className='btn btn-p'; link.href=c.url; link.target='_blank'; link.rel='noopener noreferrer';
        link.textContent='Circus で求人詳細を見る';
        const cp=document.createElement('button');
        cp.type='button'; cp.className='btn btn-g'; cp.textContent='URLをコピー';
        cp.addEventListener('click',()=>{
          navigator.clipboard.writeText(c.url).then(()=>{
            cp.textContent='コピーしました'; setTimeout(()=>{cp.textContent='URLをコピー'},1500);
          });
        });
        urlBar.appendChild(link);
        urlBar.appendChild(cp);
        body.appendChild(urlBar);
      }

      det.appendChild(body);
      list.appendChild(det);
    });

    sec.appendChild(list);
    main.appendChild(sec);
  });
}
render();
</script>
